version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Majors are taken deliberately between hiring cycles (the starter is
    # validated against pinned major versions). Note: ignore rules also
    # suppress security PRs whose fix is major-only — alerts still surface,
    # so those get handled manually.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
